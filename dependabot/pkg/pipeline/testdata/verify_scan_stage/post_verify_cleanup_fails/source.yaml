description: post verify cleanup hook fails

preVerify:
  enabled: true
  continueOnError: false
  scriptTemplate: |
    #!/bin/bash
    set -ex
    echo "pre" > "${PRE_MARKER}"

postVerify:
  enabled: true
  continueOnError: false
  scriptTemplate: |
    #!/bin/bash
    set -ex
    echo "post" > "${POST_MARKER}"
    exit 1

scan:
  vulnerabilityCount: 0
  error: ""
