description: verification scan passes with existing fixes

preVerify:
  enabled: true
  continueOnError: false
  scriptTemplate: |
    #!/bin/bash
    set -ex
    echo "pre" > "${PRE_MARKER}"

postVerify:
  enabled: true
  continueOnError: false
  scriptTemplate: |
    #!/bin/bash
    set -ex
    echo "post" > "${POST_MARKER}"

scan:
  vulnerabilityCount: 0
  error: ""
